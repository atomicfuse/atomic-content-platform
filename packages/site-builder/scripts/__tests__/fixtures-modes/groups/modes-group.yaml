group_id: modes-group
name: "Modes Test Group"

tracking:
  ga4: "G-GROUP"
  gtm: "GTM-GROUP"
  google_ads: "AW-GROUP"

scripts:
  head:
    - id: org-analytics
      src: "https://analytics.example.com/group.js"
      async: true
    - id: group-script
      inline: "console.log('group script')"
  body_start: []
  body_end:
    - id: org-footer
      inline: "console.log('group footer')"
    - id: group-refresh
      inline: "window.refresh()"

scripts_vars:
  org_var: "group-overrode-org"
  group_var: "group-value"
  ad_site_id: "group-site-001"

ads_config:
  interstitial: true
  layout: high-density
  ad_placements:
    - id: sidebar
      position: sidebar
      sizes:
        desktop: [[300, 250]]
        mobile: [[300, 250]]
      device: all
    - id: top-banner
      position: above-content
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all

ads_txt:
  - "group-network.com, 111, DIRECT"
  - "group-partner.com, 222, RESELLER"

theme:
  colors:
    primary: "#GG0000"
    secondary: "#GG1111"
    accent: "#GG2222"
  fonts:
    heading: "Group Font"
    body: "Group Body"

legal_pages_override:
  company_name: "Group Legal Name"
  site_description: "group site description"
