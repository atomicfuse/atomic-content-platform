override_id: legacy-append-scripts
name: "Legacy Append Scripts"
priority: 10

targets:
  sites:
    - legacy-append.example.com

# T05 — scripts legacy "append" mode: new scripts added, existing untouched
scripts:
  _mode: append
  head:
    - id: appended-script
      src: "https://cdn.example.com/appended.js"
      async: true
  body_end:
    - id: appended-footer
      inline: "console.log('appended footer')"
