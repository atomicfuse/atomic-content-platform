override_id: replace-modes
name: "Replace Modes Override"
priority: 10

targets:
  sites:
    - replace-test.example.com

# T02 — tracking replace: wipes all, only ga4 set
tracking:
  _mode: replace
  ga4: "G-REPLACED"

# T07 — scripts_vars replace: wipes all, only new_var set
scripts_vars:
  _mode: replace
  new_var: "only-this"

# T15 — theme replace: wipes all, only primary set
theme:
  _mode: replace
  colors:
    primary: "#REPLACED"

# T17 — legal replace: wipes all, only company_name set
legal:
  _mode: replace
  company_name: "Replaced Legal Only"

# T13 — ads_txt replace
ads_txt:
  _mode: replace
  _values:
    - "replaced.com, 1, DIRECT"
