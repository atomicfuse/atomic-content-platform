group_id: group-a
name: "Group A"

ads_txt:
  - "network-a.com, 111, DIRECT"

tracking:
  google_ads: "AW-GROUPA"

scripts:
  head:
    - id: shared-analytics
      src: "https://analytics.example.com/group-a.js"
      async: true
    - id: group-a-only
      inline: "console.log('group-a script')"
  body_start: []
  body_end: []

scripts_vars:
  shared_var: "from-group-a"
  group_a_var: "a-value"

ads_config:
  interstitial: false
  layout: standard
  ad_placements:
    - id: top-banner
      position: above-content
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all

theme:
  colors:
    primary: "#AA0000"
    secondary: "#AA1111"
