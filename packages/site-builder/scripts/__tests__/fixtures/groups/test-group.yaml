group_id: test-group
name: "Test Group"

ads_txt:
  - "google.com, pub-group, DIRECT"
  - "adnetwork.com, 12345, RESELLER"

tracking:
  google_ads: "AW-GROUP001"

scripts:
  head:
    - id: analytics
      src: "https://analytics.example.com/v2-group.js"
      async: true
    - id: ad-network
      inline: |
        window.adInit({siteId: '{{ad_site_id}}'});
  body_start: []
  body_end:
    - id: footer-script
      inline: "console.log('group footer')"
    - id: ad-refresh
      inline: "window.adRefresh()"

scripts_vars:
  ad_site_id: "default-group-id"

ads_config:
  interstitial: true
  in_content_slots: 3
  sidebar: true
  layout: standard
  ad_placements:
    - id: top-banner
      position: above-content
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all

theme:
  colors:
    primary: "#111111"
    secondary: "#222222"
    accent: "#333333"
