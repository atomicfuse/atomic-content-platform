override_id: test-override
name: "Test Override"
priority: 10

targets:
  sites:
    - multi-group.example.com
  groups:
    - group-b

tracking:
  ga4: "G-OVERRIDE-001"

scripts:
  _mode: replace
  head: []
  body_start: []
  body_end:
    - id: override-script
      src: "/override-script.js"

ads_config:
  interstitial: false
  layout: standard
  ad_placements:
    - id: override-banner
      position: above-content
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all
