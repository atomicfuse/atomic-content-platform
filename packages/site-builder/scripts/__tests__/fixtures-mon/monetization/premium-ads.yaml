monetization_id: premium-ads
name: "Premium Ads"
provider: "network-alpha"

tracking:
  ga4: "G-PREMIUM-XXX"
  gtm: "GTM-PREMIUM"
  google_ads: "AW-PREMIUM-XXX"
  facebook_pixel: "MON-FB-PIXEL"

scripts:
  head:
    - id: network-alpha-init
      inline: |
        window.alphaInit({siteId: '{{alpha_site_id}}'});
    - id: premium-analytics
      src: "https://analytics.premium.example.com/v1.js"
      async: true

ads_config:
  interstitial: true
  in_content_slots: 3
  layout: high-density
  ad_placements:
    - id: top-banner
      position: above-content
      sizes:
        desktop: [[728, 90]]
        mobile: [[320, 50]]
      device: all
    - id: in-content-1
      position: after-paragraph-3
      sizes:
        desktop: [[336, 280]]
        mobile: [[300, 250]]
      device: all

ads_txt:
  - "premium-network.com, 999, DIRECT"
  - "google.com, pub-MON-PREMIUM, DIRECT"
