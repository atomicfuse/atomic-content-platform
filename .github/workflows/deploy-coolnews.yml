name: Deploy coolnews.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy coolnews.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: atomicfuse/atomic-labs-network
          path: network-data
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-types
        run: pnpm --filter @atomic-platform/shared-types build

      - name: Build coolnews.dev
        working-directory: packages/site-builder
        run: pnpm build
        env:
          SITE_DOMAIN: coolnews.dev
          NETWORK_DATA_PATH: ${{ github.workspace }}/network-data

      - name: Deploy to Cloudflare Pages
        working-directory: packages/site-builder
        run: npx wrangler pages deploy dist --project-name=coolnews-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
