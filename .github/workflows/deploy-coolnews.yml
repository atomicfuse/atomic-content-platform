name: Rebuild All Sites (manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for rebuild (e.g. site-builder update)"
        required: false
        default: "Manual rebuild"

jobs:
  deploy:
    name: "Rebuild all sites (manual — ${{ inputs.reason }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: atomicfuse/atomic-labs-network
          path: network-data
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-types
        run: pnpm --filter @atomic-platform/shared-types build

      # TODO: when more sites exist, loop over all sites/*/
      - name: Build coolnews.dev
        working-directory: packages/site-builder
        run: pnpm build
        env:
          SITE_DOMAIN: coolnews.dev
          NETWORK_DATA_PATH: ${{ github.workspace }}/network-data
          SUBSCRIBE_API_URL: https://atomic-content-platform.apps.cloudgrid.io/api/subscribe

      - name: Deploy to Cloudflare Pages
        working-directory: packages/site-builder
        run: npx wrangler pages deploy dist --project-name=coolnews-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
